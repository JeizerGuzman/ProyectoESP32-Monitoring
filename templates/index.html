<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrackSecurity — Panel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

<!-- ─── HEADER ──────────────────────────────── -->
<header>
  <div class="header-brand">
    <div class="header-logo">
      <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="6" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="5" cy="18" r="2" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="17" cy="18" r="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M1 9h20M7 6V4h8v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-title">Track<span>Security</span></div>
  </div>

  <div class="header-user">
    <div class="user-avatar" id="userAvatar">FC</div>
    <div class="user-name" id="userName">Usuario</div>
    <button class="btn-logout" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5 12H3a1 1 0 01-1-1V3a1 1 0 011-1h2M9 10l3-3-3-3M12 7H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Salir
    </button>
  </div>
</header>

<!-- ─── CONTENIDO PRINCIPAL ──────────────────── -->
<div class="dashboard-wrapper">

  <!-- Barra de estado del sistema -->
  <div class="status-bar" id="statusBar">
    <div class="status-pill online">
      <span class="status-dot pulse"></span>
      CONECTADO
    </div>
    <div class="status-sep"></div>
    <div class="status-pill neutral" id="pillSync">SYNC --:--</div>
    <div class="status-sep"></div>
    <div class="status-pill neutral" id="pillCount">0 UNIDADES</div>
  </div>

  <div class="section-title">
    Flota activa
    <span id="sectionSub">actualizando...</span>
  </div>

  <!-- Cards de vehículos generadas por JS -->
  <div id="contenedor">
    <!-- Skeleton de carga -->
    <div class="skeleton"></div>
    <div class="skeleton" style="height:100px;margin-top:14px;opacity:0.5"></div>
  </div>

</div>

<script>
/* ─── LOGOUT ─────────────────────────────────── */
function logout() {
  window.location.href = "/logout";
}

/* ─── RELOJ ──────────────────────────────────── */
function tickClock() {
  const t = new Date().toLocaleTimeString("es-MX", { hour12: false });
  document.getElementById("pillSync").textContent = "SYNC " + t;
}
setInterval(tickClock, 1000);
tickClock();

/* ─── OBTENER DATOS ──────────────────────────── */
function actualizarEstado() {
  fetch("/estado?t=" + new Date().getTime())
    .then(res => res.json())
    .then(data => renderDatos(data))
    .catch(err => {
      console.error("Error:", err);
      document.getElementById("statusBar").querySelector(".status-pill").textContent = "SIN CONEXIÓN";
    });
}

/* ─── RENDERIZAR VEHÍCULOS ───────────────────── */
function renderDatos(data) {
  const contenedor = document.getElementById("contenedor");
  const keys = Object.keys(data).filter(k => data[k] && data[k].vehiculo);

  console.log("Datos recibidos:", data);
  console.log("Vehículos encontrados:", keys.length);

  /* Actualizar contador */
  document.getElementById("pillCount").textContent = keys.length + " UNIDADES";
  document.getElementById("sectionSub").textContent =
    "última actualización " + new Date().toLocaleTimeString("es-MX", { hour12: false });

  if (keys.length === 0) {
    contenedor.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 22 22" fill="none">
            <rect x="1" y="6" width="20" height="10" rx="2" stroke="#3D4048" stroke-width="1.5"/>
            <circle cx="5" cy="18" r="2" stroke="#3D4048" stroke-width="1.5"/>
            <circle cx="17" cy="18" r="2" stroke="#3D4048" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="empty-title">Sin vehículos activos</div>
        <div class="empty-sub">Esperando datos del ESP32...</div>
      </div>`;
    return;
  }

  // PRIMERA VEZ: Crear tarjetas si no existen
  if (contenedor.children.length === 0 || contenedor.querySelector('.empty-state') || contenedor.querySelector('.skeleton')) {
    console.log("Creando tarjetas por primera vez");
    contenedor.innerHTML = "";
    keys.forEach((key, i) => {
      const v = data[key];
      contenedor.innerHTML += crearTarjetaHTML(key, v, i);
    });
    return;
  }

  // ACTUALIZACIONES: Solo cambiar valores sin recrear HTML
  console.log("Actualizando tarjetas existentes");
  keys.forEach(key => {
    const v = data[key];
    actualizarTarjeta(key, v);
  });
}

/* ─── CREAR HTML DE TARJETA ──────────────────── */
function crearTarjetaHTML(key, v, index) {
  const esAlerta = v.alerta === 1;
  const claseCard = esAlerta ? "vehicle-card alerta" : "vehicle-card normal";
  const ts = v.timestamp ? new Date(v.timestamp * 1000).toLocaleTimeString("es-MX", { hour12: false }) : "--:--";

  const estadoVal = `<span class="metric-value ${esAlerta ? 'warn' : 'ok'}">${v.estado}</span>`;
  const puertaVal = `<span class="metric-value ${v.puerta === 'abierta' ? 'warn' : 'ok'}">${v.puerta}</span>`;
  const vibVal = `<span class="metric-value ${v.vibracion === 1 ? 'warn' : 'ok'}">${v.vibracion === 1 ? 'Detectada' : 'Normal'}</span>`;

  const alertaBar = esAlerta ? `
    <div class="alert-bar">
      <svg width="15" height="15" viewBox="0 0 14 14" fill="none">
        <path d="M7 2L1 12h12L7 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M7 6v3M7 10.5v.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Alerta activa — revisar unidad
    </div>` : "";

  return `
    <div class="${claseCard}" data-vehiculo="${key}" style="animation-delay:${index * 0.06}s">
      ${alertaBar}
      <div class="card-header">
        <div>
          <div class="card-name">${v.vehiculo}</div>
          <div class="card-plate">ESP32 · UART 115200</div>
        </div>
        <div class="status-badge ${esAlerta ? 'warn' : 'ok'}">
          <div class="badge-dot"></div>
          ${v.estado}
        </div>
      </div>

      <div class="card-metrics">
        <div class="metric">
          <div class="metric-label">ESTADO</div>
          <div class="metric-value estado-val ${esAlerta ? 'warn' : 'ok'}">${v.estado}</div>
        </div>
        <div class="metric">
          <div class="metric-label">PUERTA</div>
          <div class="metric-value puerta-val ${v.puerta === 'abierta' ? 'warn' : 'ok'}">${v.puerta}</div>
        </div>
        <div class="metric">
          <div class="metric-label">VIBRACIÓN</div>
          <div class="metric-value vibracion-val ${v.vibracion === 1 ? 'warn' : 'ok'}">${v.vibracion === 1 ? 'Detectada' : 'Normal'}</div>
        </div>
      </div>

      <div class="card-footer">
        <div class="card-footer-ts">Actualizado: <span class="timestamp">${ts}</span></div>
      </div>
    </div>`;
}

/* ─── ACTUALIZAR VALORES DE TARJETA ──────────── */
function actualizarTarjeta(key, v) {
  const card = document.querySelector(`[data-vehiculo="${key}"]`);
  if (!card) return;

  const esAlerta = v.alerta === 1;
  const ts = v.timestamp ? new Date(v.timestamp * 1000).toLocaleTimeString("es-MX", { hour12: false }) : "--:--";

  // Actualizar clase de la tarjeta (alerta/normal)
  card.className = `vehicle-card ${esAlerta ? 'alerta' : 'normal'}`;

  // Actualizar barra de alerta
  let alertBar = card.querySelector('.alert-bar');
  if (esAlerta && !alertBar) {
    // Agregar barra de alerta si no existe
    const header = card.querySelector('.card-header');
    header.insertAdjacentHTML('beforebegin', `
      <div class="alert-bar">
        <svg width="15" height="15" viewBox="0 0 14 14" fill="none">
          <path d="M7 2L1 12h12L7 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          <path d="M7 6v3M7 10.5v.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Alerta activa — revisar unidad
      </div>`);
  } else if (!esAlerta && alertBar) {
    // Quitar barra de alerta si existe
    alertBar.remove();
  }

  // Actualizar badge de estado
  const badge = card.querySelector('.status-badge');
  badge.className = `status-badge ${esAlerta ? 'warn' : 'ok'}`;
  badge.innerHTML = `<div class="badge-dot"></div>${v.estado}`;

  // Actualizar valores de métricas
  const estadoEl = card.querySelector('.estado-val');
  const puertaEl = card.querySelector('.puerta-val');
  const vibracionEl = card.querySelector('.vibracion-val');

  estadoEl.className = `metric-value estado-val ${esAlerta ? 'warn' : 'ok'}`;
  estadoEl.textContent = v.estado;

  puertaEl.className = `metric-value puerta-val ${v.puerta === 'abierta' ? 'warn' : 'ok'}`;
  puertaEl.textContent = v.puerta;

  vibracionEl.className = `metric-value vibracion-val ${v.vibracion === 1 ? 'warn' : 'ok'}`;
  vibracionEl.textContent = v.vibracion === 1 ? 'Detectada' : 'Normal';

  // Actualizar timestamp
  const timestampEl = card.querySelector('.timestamp');
  timestampEl.textContent = ts;
}

/* ─── AUTO REFRESH ───────────────────────────── */
setInterval(actualizarEstado, 1000);
actualizarEstado();
</script>
</body>
</html>
