<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrackSecurity — Panel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

<!-- ─── HEADER ──────────────────────────────── -->
<header>
  <div class="header-brand">
    <div class="header-logo">
      <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="6" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="5" cy="18" r="2" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="17" cy="18" r="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M1 9h20M7 6V4h8v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-title">Track<span>Security</span></div>
  </div>

  <div class="header-user">
    <div class="user-avatar" id="userAvatar">FC</div>
    <div style="display: flex; flex-direction: column; gap: 4px;">
      <div class="user-name" id="userName">Usuario</div>
      <span class="role-badge" id="rolBadge"></span>
    </div>
    <button class="btn-logout" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5 12H3a1 1 0 01-1-1V3a1 1 0 011-1h2M9 10l3-3-3-3M12 7H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Salir
    </button>
  </div>
</header>

<!-- ─── CONTENIDO PRINCIPAL ──────────────────── -->
<div class="dashboard-wrapper">

  <div class="status-bar" id="statusBar">
    <div class="status-pill online">
      <span class="status-dot pulse"></span>
      CONECTADO
    </div>
    <div class="status-sep"></div>
    <div class="status-pill neutral" id="pillSync">SYNC --:--</div>
    <div class="status-sep"></div>
    <div class="status-pill neutral" id="pillCount">0 UNIDADES</div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <div class="section-title">
      Flota activa
      <span id="sectionSub">actualizando...</span>
    </div>
    <button class="btn-add" id="btnAgregarVehiculo" onclick="abrirModalVehiculo()" style="display: none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Agregar vehículo
    </button>
  </div>

  <div id="contenedor">
    <div class="skeleton"></div>
    <div class="skeleton" style="height:100px;margin-top:14px;opacity:0.5"></div>
  </div>

</div>

<!-- ─── MODAL: AGREGAR VEHÍCULO ───────────────── -->
<div class="modal" id="modalVehiculo">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">Agregar vehículo</span>
      <button class="modal-close" onclick="cerrarModalVehiculo()">&times;</button>
    </div>

    <div class="form-group">
      <label class="form-label">Nombre del vehículo</label>
      <input class="form-input" type="text" id="nombreVehiculo" placeholder="Ej: Camión de carga norte"/>
      <span class="form-error" id="errorNombreVehiculo"></span>
    </div>

    <div class="form-group">
      <label class="form-label">Identificador único (debe coincidir con el ESP32)</label>
      <input class="form-input" type="text" id="identificadorVehiculo" placeholder="Ej: camion_1"/>
      <span class="form-error" id="errorIdentificadorVehiculo"></span>
    </div>

    <button class="btn-primary" onclick="crearVehiculo()">Crear vehículo</button>
  </div>
</div>

<!-- ─── MODAL: ASIGNAR CHOFER ─────────────────── -->
<div class="modal" id="modalChofer">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">Asignar chofer</span>
      <button class="modal-close" onclick="cerrarModalChofer()">&times;</button>
    </div>

    <p style="font-size:13px; color:var(--text-muted); margin-bottom:20px; font-family:var(--font-body);">
      Selecciona el chofer que operará <strong id="nombreVehiculoAsignar" style="color:var(--text);"></strong>.
    </p>

    <div class="form-group">
      <label class="form-label">Chofer</label>
      <select class="form-select" id="selectChofer">
        <option value="">Cargando choferes...</option>
      </select>
      <span class="form-error" id="errorSelectChofer"></span>
    </div>

    <button class="btn-primary" onclick="confirmarAsignacion()">Confirmar asignación</button>

    <div class="modal-divider"></div>

    <button onclick="desasignarChofer()" style="
      width:100%; padding:10px; background:transparent;
      border:1px solid rgba(255,77,106,0.25); border-radius:var(--radius-sm);
      color:var(--red); font-family:var(--font-body); font-size:13px;
      cursor:pointer; transition: background 0.2s;
    " onmouseover="this.style.background='rgba(255,77,106,0.08)'"
       onmouseout="this.style.background='transparent'">
      Quitar chofer asignado
    </button>
  </div>
</div>

<script>
  window.SESSION_TIPO     = "{{ tipo }}";
  window.SESSION_NOMBRE   = "{{ nombre }}";
  window.SESSION_ID       = "{{ id_usuario }}";
</script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
